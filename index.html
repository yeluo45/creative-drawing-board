        function startBubbleSpawning() {
            if (bubbleSpawnInterval) clearInterval(bubbleSpawnInterval);
            bubbleSpawnInterval = setInterval(spawnBubble, 800);
        }

        function stopBubbleSpawning() {
            if (bubbleSpawnInterval) {
                clearInterval(bubbleSpawnInterval);
                bubbleSpawnInterval = null;
            }
        }

        let bubbleCtx;
        const BUBBLE_COLORS = ['#FF6B6B', '#FFA94D', '#FFE066', '#69DB7C', '#74C0FC', '#B197FC', '#F783AC'];

        function handleBubbleClick(e) {
            if (!bubbleMode || !bubbleGameActive) return;

            const rect = bubbleCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                const dx = x - b.x;
                const dy = y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < b.radius) {
                    popBubble(b, i);
                    return;
                }
            }
        }

        function createParticles(x, y, color, size) {
            const count = 10;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
                const speed = 2 + Math.random() * 3;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 3 + Math.random() * 4,
                    color: color,
                    life: 1
                });
            }
        }

        document.getElementById('bubbleContinueBtn').addEventListener('click', continueBubbleGame);

        // Clear canvas with animation
        function clearCanvas() {
            initAudio();
            playSound(playBgSwitch);
            
            const ctx = drawingCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            let opacity = 0;
            
            function fadeOut() {
                opacity += 0.05;
                ctx.fillStyle = `rgba(255,255,255,${opacity})`;
                ctx.fillRect(0, 0, rect.width, rect.height);
                
                if (opacity < 1) {
                    requestAnimationFrame(fadeOut);
                } else {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, rect.width, rect.height);
                    undoStack = [];
                    redoStack = [];
                }
            }
            
            fadeOut();
        }

        // Tool selection
        function selectTool(tool) {
            currentTool = tool;
            brushBtn.classList.toggle('selected', tool === 'brush');
            eraserBtn.classList.toggle('selected', tool === 'eraser');
            stampBtn.classList.toggle('selected', tool === 'stamp');
            fillBtn.classList.toggle('selected', tool === 'fill');
            tracingBtn.classList.toggle('selected', tool === 'tracing');
            bgBtn.classList.toggle('selected', tool === 'bg');
            
            closeAllPanels();
            
            if (tool === 'stamp') {
                togglePanel('stamp');
            } else if (tool === 'tracing') {
                togglePanel('tracing');
            } else if (tool === 'fill') {
                togglePanel('fill');
            } else if (tool === 'bg') {
                togglePanel('bg');
            }
            
            if (tool !== 'stamp') {
                selectedStamp = null;
            }
        }

        // Undo/Redo
        function undo() {
            if (undoStack.length === 0) return;
            const state = undoStack.pop();
            const ctx = drawingCanvas.getContext('2d');
            const currentState = ctx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
            redoStack.push(currentState);
            ctx.putImageData(state, 0, 0);
            playSound(playUndo);
        }

        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            const ctx = drawingCanvas.getContext('2d');
            const currentState = ctx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
            undoStack.push(currentState);
            ctx.putImageData(state, 0, 0);
            playSound(playRedo);
        }

        // Save
        function saveDrawing() {
            const tempCanvas = document.createElement('canvas');
            const rect = canvasContainer.getBoundingClientRect();
            tempCanvas.width = bgCanvas.width;
            tempCanvas.height = bgCanvas.height;
            const ctx = tempCanvas.getContext('2d');
            
            ctx.fillStyle = currentBackground === 'white' ? '#FFFFFF' :
                            currentBackground === 'sky' ? '#A5D8FF' :
                            currentBackground === 'grass' ? '#69DB7C' :
                            currentBackground === 'beach' ? '#FFE066' :
                            currentBackground === 'night' ? '#1A1A2E' : '#FFFFFF';
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            ctx.drawImage(bgCanvas, 0, 0);
            ctx.drawImage(drawingCanvas, 0, 0);
            ctx.drawImage(stampCanvas, 0, 0);
            
            const link = document.createElement('a');
            link.download = 'drawing.png';
            link.href = tempCanvas.toDataURL();
            link.click();
            playSound(playSaveSuccess);
            trackSave();
        }

        // Event listeners
        function initEventListeners() {
            // Mouse events for drawing
            drawingCanvas.addEventListener('mousedown', startDrawing);
            drawingCanvas.addEventListener('mousemove', draw);
            drawingCanvas.addEventListener('mouseup', stopDrawing);
            drawingCanvas.addEventListener('mouseleave', stopDrawing);
            
            // Touch events
            drawingCanvas.addEventListener('touchstart', startDrawing, { passive: false });
            drawingCanvas.addEventListener('touchmove', draw, { passive: false });
            drawingCanvas.addEventListener('touchend', stopDrawing);
            
            // Stamp dragging (now DOM-based, handled in wrappers but need global move/up)
            document.addEventListener('mousemove', updateStampDrag);
            document.addEventListener('mouseup', stopStampDrag);
            document.addEventListener('touchmove', updateStampDrag, { passive: true });
            document.addEventListener('touchend', stopStampDrag);

            // Click on empty canvas area to deselect stamps
            drawingCanvas.addEventListener('click', (e) => {
                if (currentTool === 'stamp' && selectedStamp) {
                    const rect = drawingCanvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    placeStamp(x, y);
                } else if (currentTool !== 'stamp') {
                    deselectAllStamps();
                }
            });

            // Also handle clicks on other canvases to deselect
            [fillCanvas, tracingCanvas].forEach(canvas => {
                canvas.addEventListener('click', () => {
                    deselectAllStamps();
                });
            });

            // Bubble canvas click
            bubbleCanvas.addEventListener('click', handleBubbleClick);
            
            // Coloring canvas click
            document.getElementById('coloringCanvas').addEventListener('click', handleColoringClick);
            
            // Header buttons
            bubblesBtn.addEventListener('click', toggleBubbleMode);
            coloringBtn.addEventListener('click', enterColoringGame);
            
            // Tool buttons
            brushBtn.addEventListener('click', () => { initAudio(); playSound(playBtnClick); selectTool('brush'); });
            eraserBtn.addEventListener('click', () => { initAudio(); playSound(playBtnClick); selectTool('eraser'); });
            stampBtn.addEventListener('click', () => { initAudio(); playSound(playBtnClick); selectTool('stamp'); });
            fillBtn.addEventListener('click', () => { initAudio(); playSound(playBtnClick); selectTool('fill'); });
            tracingBtn.addEventListener('click', () => { initAudio(); playSound(playBtnClick); selectTool('tracing'); });
            bgBtn.addEventListener('click', () => { initAudio(); playSound(playBtnClick); selectTool('bg'); });
            clearBtn.addEventListener('click', clearCanvas);
            undoBtn.addEventListener('click', undo);
            redoBtn.addEventListener('click', redo);
            saveBtn.addEventListener('click', saveDrawing);
            soundBtn.addEventListener('click', toggleSound);
            
            // Resize
            window.addEventListener('resize', resizeCanvas);
            
            // Initialize canvas with white background
            const ctx = drawingCanvas.getContext('2d');
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, drawingCanvas.width, drawingCanvas.height);
        }

        // ===== Learning Record System (P0) =====
        
        // Stats data structure
        const DEFAULT_STATS = {
            drawing: 0,
            sticker: 0,
            bubble: 0,
            tracing: 0,
            coloring: 0,
            save: 0,
            lastDate: null
        };

        // Achievements definitions (12 total)
        const ACHIEVEMENTS = [
            { id: 'first_draw', name: '初次涂鸦', desc: '完成第一次涂鸦', icon: '✏️', check: (s) => s.drawing >= 1 },
            { id: 'coloring_5', name: '小画家', desc: '涂色5次', icon: '🖌️', check: (s) => s.coloring >= 5 },
            { id: 'coloring_20', name: '涂色大师', desc: '涂色20次', icon: '🎨', check: (s) => s.coloring >= 20 },
            { id: 'tracing_5', name: '描图新手', desc: '描图5次', icon: '📝', check: (s) => s.tracing >= 5 },
            { id: 'tracing_20', name: '描图高手', desc: '描图20次', icon: '🏆', check: (s) => s.tracing >= 20 },
            { id: 'sticker_50', name: '贴纸迷', desc: '使用贴纸50次', icon: '🌟', check: (s) => s.sticker >= 50 },
            { id: 'sticker_200', name: '贴纸达人', desc: '使用贴纸200次', icon: '💫', check: (s) => s.sticker >= 200 },
            { id: 'bubble_100', name: '泡泡王子/公主', desc: '填充100次', icon: '🫧', check: (s) => s.bubble >= 100 },
            { id: 'save_10', name: '保存达人', desc: '保存10次', icon: '💾', check: (s) => s.save >= 10 },
            { id: 'week_streak', name: '连续7天', desc: '连续7天使用应用', icon: '📅', check: (s) => s.weekStreak >= 7 },
            { id: 'all_stickers', name: '集齐贴纸', desc: '使用所有类型贴纸', icon: '🎯', check: (s) => s.allStickers },
            { id: 'explorer', name: '探索者', desc: '使用所有工具', icon: '🔍', check: (s) => s.explorer }
        ];

        // Load stats from localStorage
        function loadStats() {
            try {
                const saved = localStorage.getItem('drawingBoardStats');
                if (saved) {
                    return { ...DEFAULT_STATS, ...JSON.parse(saved) };
                }
            } catch (e) {}
            return { ...DEFAULT_STATS };
        }

        // Save stats to localStorage
        function saveStats(stats) {
            try {
                localStorage.setItem('drawingBoardStats', JSON.stringify(stats));
            } catch (e) {}
        }

        // Get today's date string
        function getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // Update a stat count
        function incrementStat(statName) {
            const stats = loadStats();
            stats[statName] = (stats[statName] || 0) + 1;
            stats.lastDate = getTodayStr();
            saveStats(stats);
            checkAchievements();
        }

        // Track bubble/fill usage
        function trackBubbleUse() {
            incrementStat('bubble');
        }

        // Track drawing
        function trackDrawing() {
            incrementStat('drawing');
        }

        // Track sticker use
        function trackStickerUse() {
            incrementStat('sticker');
        }

        // Track tracing
        function trackTracing() {
            incrementStat('tracing');
        }

        // Track coloring
        function trackColoring() {
            incrementStat('coloring');
        }

        // Track save
        function trackSave() {
            incrementStat('save');
        }

        // Check and unlock achievements
        function checkAchievements() {
            const stats = loadStats();
            let unlocked = JSON.parse(localStorage.getItem('unlockedAchievements') || '[]');
            let changed = false;
            
            ACHIEVEMENTS.forEach(ach => {
                if (!unlocked.includes(ach.id) && ach.check(stats)) {
                    unlocked.push(ach.id);
                    changed = true;
                    showAchievementNotification(ach);
                }
            });
            
            if (changed) {
                localStorage.setItem('unlockedAchievements', JSON.stringify(unlocked));
            }
        }

        // Show achievement popup
        function showAchievementNotification(ach) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(180deg,#FFF9DB,#FFE066);border:4px solid #495057;border-radius:20px;padding:24px;text-align:center;z-index:5000;box-shadow:8px 8px 0 #495057;animation:popIn 0.5s ease-out;';
            overlay.innerHTML = `
                <div style="font-size:3rem;margin-bottom:10px;">${ach.icon}</div>
                <div style="font-size:1.2rem;font-weight:bold;color:#495057;margin-bottom:8px;">🎉 成就解锁!</div>
                <div style="font-size:1.1rem;font-weight:bold;color:#40C057;">${ach.name}</div>
                <div style="font-size:0.9rem;color:#868e96;margin-top:4px;">${ach.desc}</div>
            `;
            document.body.appendChild(overlay);
            playSound && playSound(playSaveSuccess);
            setTimeout(() => {
                overlay.style.animation = 'fadeIn 0.3s ease-out reverse';
                setTimeout(() => overlay.remove(), 300);
            }, 2500);
        }

        // Open stats overlay
        function openStats() {
            initAudio && initAudio();
            playSound && playSound(playBtnClick);
            updateStatsDisplay();
            renderAchievements();
            document.getElementById('statsOverlay').classList.add('active');
        }

        // Close stats overlay
        function closeStats() {
            document.getElementById('statsOverlay').classList.remove('active');
            playSound && playSound(playBtnClick);
        }

        // Switch between stats and achievements tabs
        function switchStatsTab(tab) {
            document.querySelectorAll('.stats-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'stats') {
                document.getElementById('statsPanel').style.display = 'block';
                document.getElementById('achievementsPanel').style.display = 'none';
            } else {
                document.getElementById('statsPanel').style.display = 'none';
                document.getElementById('achievementsPanel').style.display = 'block';
                renderAchievements();
            }
        }

        // Update stats display
        function updateStatsDisplay() {
            const stats = loadStats();
            document.getElementById('statDrawing').textContent = stats.drawing;
            document.getElementById('statSticker').textContent = stats.sticker;
            document.getElementById('statBubble').textContent = stats.bubble;
            document.getElementById('statTracing').textContent = stats.tracing;
            document.getElementById('statColoring').textContent = stats.coloring;
            document.getElementById('statSave').textContent = stats.save;
            document.getElementById('statDate').textContent = stats.lastDate || '-';
        }

        // Render achievements grid
        function renderAchievements() {
            const stats = loadStats();
            const unlocked = JSON.parse(localStorage.getItem('unlockedAchievements') || '[]');
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = '';
            
            ACHIEVEMENTS.forEach(ach => {
                const isUnlocked = unlocked.includes(ach.id);
                const div = document.createElement('div');
                div.className = `achievement-badge ${isUnlocked ? 'unlocked' : 'locked'}`;
                div.innerHTML = `
                    <div class="achievement-icon">${isUnlocked ? ach.icon : '🔒'}</div>
                    <div class="achievement-name">${ach.name}</div>
                    <div class="achievement-desc">${isUnlocked ? ach.desc : '???'}</div>
                `;
                grid.appendChild(div);
            });
        }

        // ===== Gallery Feature =====
        const MAX_GALLERY_ITEMS = 10;
        const MAX_THUMBNAIL_SIZE = 50 * 1024; // 50KB
        const GALLERY_STORAGE_KEY = 'drawing_board_gallery';

        // Compress image to stay within size limit
        function compressToDataURL(canvas, maxSizeBytes) {
            let quality = 0.9;
            let dataUrl = canvas.toDataURL('image/jpeg', quality);
            
            while (dataUrl.length > maxSizeBytes && quality > 0.1) {
                quality -= 0.1;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
            }
            
            // If still too large, reduce dimensions
            if (dataUrl.length > maxSizeBytes) {
                const tempCanvas = document.createElement('canvas');
                const scale = Math.sqrt(maxSizeBytes / dataUrl.length);
                tempCanvas.width = canvas.width * scale;
                tempCanvas.height = canvas.height * scale;
                const ctx = tempCanvas.getContext('2d');
                ctx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
                return tempCanvas.toDataURL('image/jpeg', 0.7);
            }
            
            return dataUrl;
        }

        // Get full canvas composite for saving
        function getFullCanvasData() {
            const tempCanvas = document.createElement('canvas');
            const rect = canvasContainer.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            tempCanvas.width = rect.width * dpr;
            tempCanvas.height = rect.height * dpr;
            const ctx = tempCanvas.getContext('2d');
            
            // Fill background color
            ctx.fillStyle = currentBackground === 'white' ? '#FFFFFF' :
                            currentBackground === 'sky' ? '#A5D8FF' :
                            currentBackground === 'grass' ? '#69DB7C' :
                            currentBackground === 'beach' ? '#FFE066' :
                            currentBackground === 'night' ? '#1A1A2E' :
                            currentBackground === 'space' ? '#0d0d1a' :
                            currentBackground === 'underwater' ? '#A5D8FF' :
                            currentBackground === 'forest' ? '#69DB7C' :
                            currentBackground === 'sunset' ? '#FFE066' : '#FFFFFF';
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            ctx.drawImage(bgCanvas, 0, 0);
            ctx.drawImage(drawingCanvas, 0, 0);
            ctx.drawImage(stampCanvas, 0, 0);
            
            return tempCanvas;
        }

        // Create thumbnail (compressed, max 50KB)
        function createThumbnail() {
            const fullCanvas = getFullCanvasData();
            return compressToDataURL(fullCanvas, MAX_THUMBNAIL_SIZE);
        }

        // Load gallery from localStorage
        function loadGallery() {
            const saved = localStorage.getItem(GALLERY_STORAGE_KEY);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        // Save gallery to localStorage
        function saveGallery(gallery) {
            localStorage.setItem(GALLERY_STORAGE_KEY, JSON.stringify(gallery));
        }

        // Add current drawing to gallery
        function addToGallery() {
            const gallery = loadGallery();
            const thumbnail = createThumbnail();
            const fullData = getFullCanvasData().toDataURL('image/png');
            
            const newItem = {
                id: Date.now(),
                thumbnail: thumbnail,
                fullImage: fullData,
                timestamp: new Date().toLocaleString('zh-CN')
            };
            
            gallery.unshift(newItem);
            
            // Keep only last 10
            if (gallery.length > MAX_GALLERY_ITEMS) {
                gallery.pop();
            }
            
            saveGallery(gallery);
            playSound(playSaveSuccess);
        }

        // Auto-save drawing when leaving (on page unload)
        function autoSaveToGallery() {
            // Only save if there's actual drawing content
            const ctx = drawingCanvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
            const hasContent = imageData.data.some((val, i) => i % 4 !== 3 && val !== 255);
            
            if (hasContent) {
                addToGallery();
            }
        }

        // Open gallery
        function openGallery() {
            initAudio();
            playSound(playBtnClick);
            renderGallery();
            document.getElementById('galleryOverlay').classList.add('active');
        }

        // Close gallery
        function closeGallery() {
            document.getElementById('galleryOverlay').classList.remove('active');
            playSound(playBtnClick);
        }

        // Render gallery items
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const empty = document.getElementById('galleryEmpty');
            const gallery = loadGallery();
            
            grid.innerHTML = '';
            
            if (gallery.length === 0) {
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            
            gallery.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                
                const img = document.createElement('img');
                img.src = item.thumbnail;
                img.alt = 'Drawing';
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '×';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteFromGallery(item.id);
                };
                
                div.appendChild(img);
                div.appendChild(delBtn);
                
                div.addEventListener('click', () => viewFullImage(item));
                
                grid.appendChild(div);
            });
        }

        // Delete from gallery
        function deleteFromGallery(id) {
            const gallery = loadGallery();
            const newGallery = gallery.filter(item => item.id !== id);
            saveGallery(newGallery);
            renderGallery();
            playSound(playStampRemove);
        }

        // View full size image
        let currentFullImage = null;

        function viewFullImage(item) {
            currentFullImage = item;
            document.getElementById('fullImage').src = item.fullImage;
            document.getElementById('fullImageOverlay').classList.add('active');
            playSound(playBtnClick);
        }

        // Close full image view
        function closeFullImage() {
            document.getElementById('fullImageOverlay').classList.remove('active');
            currentFullImage = null;
            playSound(playBtnClick);
        }

        // Download full image
        function downloadFullImage() {
            if (!currentFullImage) return;
            
            const link = document.createElement('a');
            link.download = `drawing_${currentFullImage.id}.png`;
            link.href = currentFullImage.fullImage;
            link.click();
            playSound(playSaveSuccess);
        }

        // Initialize
        function init() {
            loadSoundPreference(); // V3: Load sound preference from localStorage
            updateSoundButton(); // V3: Update sound button appearance
            initColorPalette();
            initStampPanel();
            initTracingPanel();
            initBackgroundPanel();
            resizeCanvas();
            initEventListeners();
            initColoringGame();
            initStatsButton();
            initGalleryButton();

            const ctx = drawingCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, rect.width, rect.height);

            // Check achievements on load
            checkAchievements();

            // Auto-save to gallery on page unload
            window.addEventListener('beforeunload', autoSaveToGallery);
        }

        // Init stats button
        function initStatsButton() {
            document.getElementById('statsBtn').addEventListener('click', openStats);
        }

        // Init gallery button
        function initGalleryButton() {
            document.getElementById('galleryBtn').addEventListener('click', openGallery);
        }

        init();
    </script>
</body>
</html>
