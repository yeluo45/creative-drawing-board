<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Creative Drawing Board for Toddlers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comic Neue', cursive, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE4EC 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* Header */
        .header {
            height: 50px;
            background: linear-gradient(180deg, #FF9A9E 0%, #FECFEF 100%);
            border-bottom: 3px solid #495057;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-size: 1.4rem;
            color: #495057;
            font-weight: bold;
            text-shadow: 1px 1px 0 white;
        }

        .header-btns {
            display: flex;
            gap: 8px;
        }

        .bubbles-btn, .coloring-btn {
            background: linear-gradient(180deg, #74C0FC 0%, #4DABF7 100%);
            border: 3px solid #495057;
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 3px 3px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            min-width: 80px;
            min-height: 44px;
            font-family: inherit;
        }

        .bubbles-btn:active, .coloring-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #495057;
        }

        .bubbles-btn.active {
            background: linear-gradient(180deg, #69DB7C 0%, #40C057 100%);
            box-shadow: 3px 3px 0 #495057, inset 0 0 0 3px white;
        }

        .coloring-btn {
            background: linear-gradient(180deg, #B197FC 0%, #9775FA 100%);
        }

        /* Canvas Container */
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #tracingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #drawingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: crosshair;
        }

        #fillCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        #stampCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        #bubbleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .canvas-container.bubble-mode #bubbleCanvas {
            pointer-events: auto;
        }

        /* Panels */
        .panel {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 3px solid #495057;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 4px 4px 0 #495057;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 8px;
        }

        .panel-item {
            width: 60px;
            height: 60px;
            border: 2px solid #495057;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.1s;
        }

        .panel-item:hover, .panel-item.selected {
            background: #FFE066;
            transform: scale(1.05);
        }

        .panel-item svg {
            width: 40px;
            height: 40px;
        }

        .panel-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .panel-nav-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #495057;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        .panel-close {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #495057;
            background: #FF6B6B;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tracing Panel */
        #tracingPanel .panel-grid {
            grid-template-columns: repeat(4, 70px);
        }

        .panel-item.tracing-item {
            width: 70px;
            height: 70px;
            font-size: 0.7rem;
            text-align: center;
            padding: 4px;
        }

        /* Coloring Game Overlay */
        #coloringOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE4EC 100%);
            z-index: 1000;
            flex-direction: column;
        }

        #coloringOverlay.active {
            display: flex;
        }

        .coloring-header {
            height: 50px;
            background: linear-gradient(180deg, #B197FC 0%, #9775FA 100%);
            border-bottom: 3px solid #495057;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .coloring-title {
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0 #495057;
        }

        .coloring-canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #coloringCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .coloring-tools {
            height: 60px;
            background: linear-gradient(180deg, #FFE4EC 0%, #FFF8E7 100%);
            border-top: 3px solid #495057;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px;
        }

        .coloring-btn {
            padding: 8px 20px;
            border-radius: 12px;
            border: 3px solid #495057;
            background: white;
            cursor: pointer;
            box-shadow: 2px 2px 0 #495057;
            font-size: 1rem;
            font-weight: bold;
            color: #495057;
            font-family: inherit;
            min-height: 44px;
        }

        .coloring-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #495057;
        }

        .coloring-btn.done-btn {
            background: #69DB7C;
            color: white;
        }

        .coloring-btn.reset-btn {
            background: #FFA94D;
            color: white;
        }

        .coloring-btn.back-btn {
            background: #74C0FC;
            color: white;
        }

        /* Complete Overlay */
        #completeOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        #completeOverlay.active {
            display: flex;
        }

        .complete-box {
            background: white;
            border: 4px solid #495057;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            box-shadow: 8px 8px 0 #495057;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .complete-text {
            font-size: 2rem;
            font-weight: bold;
            color: #69DB7C;
            margin-bottom: 16px;
        }

        .complete-stars {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        /* Color Palette */
        .color-palette {
            height: 60px;
            background: linear-gradient(180deg, #FFF8E7 0%, #FFE4EC 100%);
            border-top: 3px solid #495057;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px;
        }

        .color-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid #495057;
            cursor: pointer;
            box-shadow: 2px 2px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            flex-shrink: 0;
        }

        .color-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #495057;
        }

        .color-btn.selected {
            box-shadow: 0 0 0 3px #495057, 0 0 0 6px white, 3px 3px 0 #495057;
        }

        /* Tools */
        .tools {
            height: 60px;
            background: linear-gradient(180deg, #FFE4EC 0%, #FFF8E7 100%);
            border-top: 3px solid #495057;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
        }

        .tool-btn {
            padding: 6px 10px;
            border-radius: 10px;
            border: 3px solid #495057;
            background: white;
            cursor: pointer;
            box-shadow: 2px 2px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            font-size: 0.8rem;
            font-weight: bold;
            color: #495057;
            font-family: inherit;
            min-width: 56px;
            min-height: 44px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .tool-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #495057;
        }

        .tool-btn.selected {
            background: #FFE066;
        }

        .tool-btn.brush-btn.selected {
            background: #69DB7C;
            color: white;
        }

        .tool-btn.eraser-btn.selected {
            background: #74C0FC;
        }

        .tool-btn.stamp-btn.selected {
            background: #F783AC;
        }

        .tool-btn.fill-btn.selected {
            background: #4DABF7;
        }

        .tool-btn.tracing-btn.selected {
            background: #9775FA;
            color: white;
        }

        .tool-btn.bg-btn.selected {
            background: #FFA94D;
        }

        .tool-icon {
            font-size: 1.2rem;
        }

        .spacer {
            flex: 1;
        }

        .clear-btn {
            background: #FF6B6B;
            color: white;
        }

        .clear-btn:active {
            background: #fa5252;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 0; }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 0.5s ease-out forwards;
        }

        @keyframes particleFade {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .stamp {
            position: absolute;
            pointer-events: auto;
            cursor: move;
            animation: bounceIn 0.3s ease-out;
            transform-origin: center center;
        }

        /* Backgrounds */
        .bg-white { background: #FFFFFF; }
        .bg-sky { background: linear-gradient(180deg, #74C0FC 0%, #A5D8FF 100%); }
        .bg-grass { background: linear-gradient(180deg, #8CE99A 0%, #69DB7C 100%); }
        .bg-beach { background: linear-gradient(180deg, #74C0FC 30%, #FFA94D 60%, #FFE066 100%); }
        .bg-night { background: linear-gradient(180deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%); }
        .bg-checker {
            background-image: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
            background-color: #FFFFFF;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-title">Creative Drawing Board</div>
        <div class="header-btns">
            <button class="bubbles-btn" id="bubblesBtn">Bubbles</button>
            <button class="coloring-btn" id="coloringBtn">Coloring</button>
        </div>
    </header>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="bgCanvas"></canvas>
        <canvas id="tracingCanvas"></canvas>
        <canvas id="drawingCanvas"></canvas>
        <canvas id="fillCanvas"></canvas>
        <canvas id="stampCanvas"></canvas>
        <canvas id="bubbleCanvas"></canvas>
        
        <!-- Stamp Panel -->
        <div class="panel" id="stampPanel">
            <button class="panel-close" onclick="closeAllPanels()">×</button>
            <div class="panel-grid" id="stampGrid"></div>
        </div>
        
        <!-- Tracing Panel -->
        <div class="panel" id="tracingPanel">
            <button class="panel-close" onclick="closeAllPanels()">×</button>
            <div class="panel-grid" id="tracingGrid"></div>
            <div class="panel-nav">
                <button class="panel-nav-btn" onclick="prevTracing()">◀ Prev</button>
                <button class="panel-nav-btn" onclick="toggleTracingVisibility()">👁 Show/Hide</button>
                <button class="panel-nav-btn" onclick="clearTracingLines()">Clear Lines</button>
                <button class="panel-nav-btn" onclick="nextTracing()">Next ▶</button>
            </div>
        </div>
        
        <!-- Fill Panel -->
        <div class="panel" id="fillPanel">
            <button class="panel-close" onclick="closeAllPanels()">×</button>
            <div style="text-align:center;padding:8px;font-weight:bold;color:#495057;">
                Tap canvas to fill area with selected color
            </div>
        </div>
        
        <!-- Background Panel -->
        <div class="panel" id="bgPanel">
            <button class="panel-close" onclick="closeAllPanels()">×</button>
            <div class="panel-grid" id="bgGrid"></div>
        </div>
    </div>

    <div class="color-palette" id="colorPalette">
        <!-- Colors injected by JS -->
    </div>

    <div class="tools">
        <button class="tool-btn brush-btn selected" id="brushBtn">
            <span class="tool-icon">✏️</span>
            <span>Brush</span>
        </button>
        <button class="tool-btn stamp-btn" id="stampBtn">
            <span class="tool-icon">🎨</span>
            <span>Sticker</span>
        </button>
        <button class="tool-btn fill-btn" id="fillBtn">
            <span class="tool-icon">🪣</span>
            <span>Fill</span>
        </button>
        <button class="tool-btn tracing-btn" id="tracingBtn">
            <span class="tool-icon">📝</span>
            <span>Tracing</span>
        </button>
        <button class="tool-btn bg-btn" id="bgBtn">
            <span class="tool-icon">🖼️</span>
            <span>BG</span>
        </button>
        <button class="tool-btn eraser-btn" id="eraserBtn">
            <span class="tool-icon">🧹</span>
            <span>Eraser</span>
        </button>
        <div class="spacer"></div>
        <button class="tool-btn" id="undoBtn" title="Undo">↩️</button>
        <button class="tool-btn" id="redoBtn" title="Redo">↪️</button>
        <button class="tool-btn clear-btn" id="clearBtn">Clear</button>
        <button class="tool-btn" id="saveBtn" title="Save">💾</button>
    </div>

    <!-- Coloring Game Overlay -->
    <div id="coloringOverlay">
        <div class="coloring-header">
            <div class="coloring-title" id="coloringTitle">Coloring Page</div>
            <button class="coloring-btn back-btn" onclick="exitColoringGame()">← Back</button>
        </div>
        <div class="coloring-canvas-wrap" id="coloringWrap">
            <canvas id="coloringCanvas"></canvas>
        </div>
        <div class="coloring-tools">
            <button class="coloring-btn done-btn" onclick="completeColoring()">✨ Done!</button>
            <button class="coloring-btn reset-btn" onclick="resetColoring()">🔄 Reset</button>
        </div>
    </div>

    <!-- Complete Overlay -->
    <div id="completeOverlay">
        <div class="complete-box">
            <div class="complete-stars">⭐🌟⭐🌟⭐</div>
            <div class="complete-text">太棒了!</div>
            <button class="coloring-btn done-btn" onclick="closeComplete()">继续</button>
        </div>
    </div>

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playPopSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playBubblePopSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playWhooshSound() {
            initAudio();
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.3);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            source.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
        }

            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start();

        }

                btn.addEventListener('touchstart', (e) => {

                btn.classList.toggle('selected', btn.dataset.color === color);

        // Canvas setup
        function resizeCanvas() {
            const rect = canvasContainer.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            [bgCanvas, tracingCanvas, drawingCanvas, fillCanvas, stampCanvas, bubbleCanvas].forEach(canvas => {
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
            });

            const ctx = drawingCanvas.getContext('2d');
            ctx.scale(dpr, dpr);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const bgCtx = bgCanvas.getContext('2d');
            bgCtx.scale(dpr, dpr);

            const tracingCtx = tracingCanvas.getContext('2d');
            tracingCtx.scale(dpr, dpr);

            const fillCtx = fillCanvas.getContext('2d');
            fillCtx.scale(dpr, dpr);

            const stampCtx = stampCanvas.getContext('2d');
            stampCtx.scale(dpr, dpr);

            const bubbleCtx2 = bubbleCanvas.getContext('2d');
            bubbleCtx2.scale(dpr, dpr);

            // Redraw background
            drawBackground();

        function drawBackground() {
            const ctx = bgCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            if (currentBackground === 'night') {
                // Draw stars
                ctx.fillStyle = '#FFFFFF';
                for (let i = 0; i < 50; i++) {
                    const x = Math.random() * rect.width;
                    const y = Math.random() * rect.height * 0.6;
                    const size = Math.random() * 2 + 1;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (currentBackground === 'sky') {
                // Draw clouds
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                drawCloud(ctx, rect.width * 0.2, rect.height * 0.15, 40);
                drawCloud(ctx, rect.width * 0.6, rect.height * 0.1, 50);
                drawCloud(ctx, rect.width * 0.8, rect.height * 0.2, 35);
            } else if (currentBackground === 'beach') {
                // Draw waves
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, rect.height * 0.35 + i * 15);
                    for (let x = 0; x < rect.width; x += 20) {
                        ctx.quadraticCurveTo(x + 10, rect.height * 0.35 + i * 15 - 5, x + 20, rect.height * 0.35 + i * 15);
                    }
                    ctx.stroke();
                }
            }
        }

        function drawCloud(ctx, x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        // Drawing functions
        function getPos(e) {
            const rect = drawingCanvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function saveUndoState() {
            const ctx = drawingCanvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
            undoStack.push({ type: 'canvas', data: imageData });
            redoStack = [];
            if (undoStack.length > 50) undoStack.shift();
        }

        function startDrawing(e) {
            if (bubbleMode) return;
            if (currentTool === 'stamp' && selectedStamp) return;
            
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;

            if (currentTool === 'fill') {
                performFloodFill(pos.x, pos.y);
                isDrawing = false;
                return;
            }

            if (currentTool === 'brush' || currentTool === 'eraser') {
                saveUndoState();
            }
        }

        function draw(e) {
            if (!isDrawing || bubbleMode) return;
            e.preventDefault();
            
            const pos = getPos(e);
            const ctx = drawingCanvas.getContext('2d');
            
            ctx.beginPath();
            ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor;
            ctx.lineWidth = currentSize;
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // ===== M3: Flood Fill =====
        function performFloodFill(startX, startY) {
            const ctx = drawingCanvas.getContext('2d');
            const fillCtx = fillCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvasContainer.getBoundingClientRect();
            
            // Limit fill area to 500x500
            const size = 500;
            const offsetX = Math.max(0, Math.floor(startX - size / 2));
            const offsetY = Math.max(0, Math.floor(startY - size / 2));
            const actualSize = Math.min(size, Math.floor(rect.width - offsetX), Math.floor(rect.height - offsetY));
            
            if (actualSize < 1) return;

            saveUndoState();

            const imageData = ctx.getImageData(offsetX * dpr, offsetY * dpr, actualSize * dpr, actualSize * dpr);
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;

            const startPixelX = Math.floor(startX - offsetX);
            const startPixelY = Math.floor(startY - offsetY);
            const startIdx = (startPixelY * width + startPixelX) * 4;

            const startR = data[startIdx];
            const startG = data[startIdx + 1];
            const startB = data[startIdx + 2];
            const startA = data[startIdx + 3];

            const fillR = parseInt(currentColor.slice(1, 3), 16);
            const fillG = parseInt(currentColor.slice(3, 5), 16);
            const fillB = parseInt(currentColor.slice(5, 7), 16);

            // Don't fill if clicking on same color
            if (Math.abs(startR - fillR) < 10 && Math.abs(startG - fillG) < 10 && Math.abs(startB - fillB) < 10) return;

            const visited = new Uint8Array(width * height);
            const stack = [[startPixelX, startPixelY]];
            const threshold = 128;

            function matchesStart(idx) {
                const a = data[idx + 3];
                if (a < threshold) return false;
                const dr = Math.abs(data[idx] - startR);
                const dg = Math.abs(data[idx + 1] - startG);
                const db = Math.abs(data[idx + 2] - startB);
                return dr < 50 && dg < 50 && db < 50;
            }

            function matchesFill(idx) {
                return Math.abs(data[idx] - fillR) < 10 && Math.abs(data[idx + 1] - fillG) < 10 && Math.abs(data[idx + 2] - fillB) < 10;
            }

            while (stack.length > 0) {
                const [x, y] = stack.pop();
                if (x < 0 || x >= width || y < 0 || y >= height) continue;
                
                const pixelIdx = y * width + x;
                if (visited[pixelIdx]) continue;
                
                const idx = pixelIdx * 4;
                if (!matchesStart(idx) || matchesFill(idx)) continue;
                
                visited[pixelIdx] = 1;
                data[idx] = fillR;
                data[idx + 1] = fillG;
                data[idx + 2] = fillB;
                data[idx + 3] = 255;

                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }

            ctx.putImageData(imageData, offsetX * dpr, offsetY * dpr);
            playPopSound();
        }

        // ===== M1: Stamps =====
        function initStampPanel() {
            const grid = document.getElementById('stampGrid');
            STAMPS.forEach(stamp => {
                const item = document.createElement('div');
                item.className = 'panel-item';

        function placeStamp(x, y) {
            if (!selectedStamp) return;
            
            const stamp = {
                id: Date.now(),
                type: selectedStamp.id,
                svg: selectedStamp.svg,
                x: x - 30,

            };
            
            placedStamps.push(stamp);

        function renderStamps() {
            const ctx = stampCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            placedStamps.forEach(stamp => {
                const img = new Image();
                const svgBlob = new Blob([stamp.svg], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(svgBlob);
                
                img.onload = () => {
                    ctx.drawImage(img, stamp.x, stamp.y, 60 * stamp.scale, 60 * stamp.scale);
                    URL.revokeObjectURL(url);
                };
                img.src = url;
            });
        }

        function checkStampHit(x, y) {
            for (let i = placedStamps.length - 1; i >= 0; i--) {
                const stamp = placedStamps[i];
                if (x >= stamp.x && x <= stamp.x + 60 && y >= stamp.y && y <= stamp.y + 60) {
                    return stamp;
                }
            }
            return null;
        }

        function deleteStamp(stamp) {
            const idx = placedStamps.indexOf(stamp);
            if (idx >= 0) {

                renderStamps();

            }

        // ===== M2: Tracing =====
        function initTracingPanel() {
            const grid = document.getElementById('tracingGrid');
            TRACING_TEMPLATES.forEach((template, index) => {
                const item = document.createElement('div');
                item.className = 'panel-item tracing-item';
                item.innerHTML = `<span>${template.name}</span>`;
                item.addEventListener('click', () => selectTracing(index));
                grid.appendChild(item);
            });
        }

        function selectTracing(index) {
            currentTracing = index;
            closeAllPanels();
            drawTracing();
            tracingBtn.classList.add('selected');
            playPopSound();
        }

        function drawTracing() {
            const ctx = tracingCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            if (currentTracing < 0 || !tracingVisible) return;

            const template = TRACING_TEMPLATES[currentTracing];
            const scale = Math.min(rect.width, rect.height) / 100;
            const offsetX = rect.width / 2 - 50 * scale;
            const offsetY = rect.height / 2 - 50 * scale;

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            ctx.strokeStyle = '#495057';
            ctx.lineWidth = 3 / scale;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = 0.4;

            template.paths.forEach(path => {
                ctx.beginPath();
                switch (path.type) {
                    case 'move':
                        ctx.moveTo(path.x, path.y);
                        break;
                    case 'line':
                        ctx.lineTo(path.x, path.y);
                        break;
                    case 'arc':
                        ctx.arc(path.x, path.y, path.r, path.start, path.end);
                        break;
                    case 'bezier':
                        ctx.bezierCurveTo(path.x1, path.y1, path.x2, path.y2, path.x, path.y);
                        break;
                    case 'rect':
                        ctx.rect(path.x, path.y, path.w, path.h);
                        break;
                    case 'ellipse':
                        ctx.ellipse(path.cx, path.cy, path.rx, path.ry, 0, 0, Math.PI * 2);
                        break;
                }
                ctx.stroke();
            });

            ctx.restore();
        }

        function prevTracing() {
            if (currentTracing > 0) {
                currentTracing--;
                drawTracing();
                playPopSound();
            }
        }

        function nextTracing() {
            if (currentTracing < TRACING_TEMPLATES.length - 1) {
                currentTracing++;
                drawTracing();
                playPopSound();
            }
        }

        function toggleTracingVisibility() {
            tracingVisible = !tracingVisible;
            drawTracing();
            playPopSound();
        }

        // ===== M5: Coloring Game =====
        function initColoringGame() {
            coloringCanvas = document.getElementById('coloringCanvas');
            coloringRegions = JSON.parse(JSON.stringify(COLORING_PAGES[coloringPage].regions));
            renderColoringPage();
        }

        function enterColoringGame() {
            coloringPage = 0;
            coloringRegions = JSON.parse(JSON.stringify(COLORING_PAGES[coloringPage].regions));
            document.getElementById('coloringTitle').textContent = COLORING_PAGES[coloringPage].name;
            document.getElementById('coloringOverlay').classList.add('active');
            
            const wrap = document.getElementById('coloringWrap');
            coloringCanvas.width = wrap.offsetWidth;
            coloringCanvas.height = wrap.offsetHeight;
            
            renderColoringPage();
            playPopSound();
        }

        function exitColoringGame() {
            document.getElementById('coloringOverlay').classList.remove('active');
            playPopSound();
        }

        function renderColoringPage() {
            if (!coloringCanvas) return;
            
            const ctx = coloringCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            ctx.clearRect(0, 0, coloringCanvas.width, coloringCanvas.height);

            const page = COLORING_PAGES[coloringPage];
            const scale = Math.min(coloringCanvas.width / dpr, coloringCanvas.height / dpr) / 100;
            const offsetX = (coloringCanvas.width / dpr - 100 * scale) / 2;
            const offsetY = (coloringCanvas.height / dpr - 100 * scale) / 2;

            ctx.save();
            ctx.translate(offsetX * dpr, offsetY * dpr);
            ctx.scale(scale * dpr, scale * dpr);

            // Draw background
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, 100, 100);

            // Draw regions
            coloringRegions.forEach(region => {
                ctx.beginPath();
                const path = new Path2D(region.path);
                ctx.fillStyle = region.color;
                ctx.fill(path, region.fillRule || 'evenodd');
                
                // Draw stroke for unfilled regions
                if (region.color === 'white' || region.color === '#FFFFFF') {
                    ctx.strokeStyle = '#495057';
                    ctx.lineWidth = 2;
                    ctx.stroke(path);
                }
            });

            ctx.restore();
        }

        function handleColoringClick(e) {
            const rect = coloringCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const dpr = window.devicePixelRatio || 1;

            const page = COLORING_PAGES[coloringPage];
            const scale = Math.min(coloringCanvas.width / dpr, coloringCanvas.height / dpr) / 100;
            const offsetX = (coloringCanvas.width / dpr - 100 * scale) / 2;
            const offsetY = (coloringCanvas.height / dpr - 100 * scale) / 2;

            const pathX = (x / dpr - offsetX) / scale;
            const pathY = (y / dpr - offsetY) / scale;

            // Check if clicked inside a region
            const ctx = coloringCanvas.getContext('2d');
            
            for (let i = 0; i < coloringRegions.length; i++) {
                const region = coloringRegions[i];
                const path = new Path2D(region.path);
                
                if (ctx.isPointInPath(path, pathX, pathY)) {
                    region.color = currentColor;
                    renderColoringPage();
                    playPopSound();
                    break;
                }
            }
        }

        function completeColoring() {
            document.getElementById('completeOverlay').classList.add('active');

        function closeComplete() {
            document.getElementById('completeOverlay').classList.remove('active');

                coloringPage++;
                coloringRegions = JSON.parse(JSON.stringify(COLORING_PAGES[coloringPage].regions));
                document.getElementById('coloringTitle').textContent = COLORING_PAGES[coloringPage].name;
                renderColoringPage();

        function resetColoring() {

            renderColoringPage();

        // Bubble mode
        function toggleBubbleMode() {
            initAudio();
            playPopSound();
            bubbleMode = !bubbleMode;
            bubblesBtn.classList.toggle('active', bubbleMode);
            canvasContainer.classList.toggle('bubble-mode', bubbleMode);
            
            if (bubbleMode) {
                bubbleCtx = bubbleCanvas.getContext('2d');
                bubbleCtx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
                startBubbleSpawning();
                requestAnimationFrame(animateBubbles);
            } else {
                stopBubbleSpawning();
                bubbles = [];
                const ctx = bubbleCanvas.getContext('2d');
                ctx.clearRect(0, 0, bubbleCanvas.width, bubbleCanvas.height);
            }
        }

        function startBubbleSpawning() {
            bubbleSpawnInterval = setInterval(spawnBubble, 500);
        }

        function stopBubbleSpawning() {
            if (bubbleSpawnInterval) {
                clearInterval(bubbleSpawnInterval);
                bubbleSpawnInterval = null;
            }
        }

        let bubbleCtx;
        const BUBBLE_COLORS = ['#FF6B6B', '#FFA94D', '#FFE066', '#69DB7C', '#74C0FC', '#B197FC', '#F783AC'];

        function spawnBubble() {
            const rect = canvasContainer.getBoundingClientRect();
            const bubble = {
                x: Math.random() * rect.width,
                y: rect.height + 50,
                radius: 20 + Math.random() * 40,
                color: BUBBLE_COLORS[Math.floor(Math.random() * BUBBLE_COLORS.length)],
                wobbleOffset: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.5 + Math.random() * 0.5,
                riseSpeed: 0.5 + Math.random() * 1,
                opacity: 0.7 + Math.random() * 0.3
            };
            bubbles.push(bubble);
        }

        function animateBubbles() {
            if (!bubbleMode) return;
            
            const ctx = bubbleCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvasContainer.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                
                b.y -= b.riseSpeed;
                b.wobbleOffset += 0.02;
                const wobble = Math.sin(b.wobbleOffset) * 0.5;
                
                if (b.y + b.radius < 0) {
                    bubbles.splice(i, 1);
                    continue;
                }
                
                ctx.save();
                ctx.globalAlpha = b.opacity;
                
                const gradient = ctx.createRadialGradient(
                    b.x - b.radius * 0.3, b.y - b.radius * 0.3, 0,
                    b.x, b.y, b.radius
                );
                gradient.addColorStop(0, 'rgba(255,255,255,0.8)');
                gradient.addColorStop(0.5, b.color + '99');
                gradient.addColorStop(1, b.color + '44');
                
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(b.x - b.radius * 0.3, b.y - b.radius * 0.3, b.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fill();
                
                ctx.restore();
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.radius *= 0.95;
                
                if (p.life <= 0 || p.radius < 1) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.restore();
            }
            
            requestAnimationFrame(animateBubbles);
        }

        function handleBubbleClick(e) {
            if (!bubbleMode) return;
            
            const rect = bubbleCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                const dx = x - b.x;
                const dy = y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < b.radius) {
                    playBubblePopSound();
                    createParticles(b.x, b.y, b.color, b.radius);
                    bubbles.splice(i, 1);
                    return;
                }
            }
        }

        function createParticles(x, y, color, size) {
            const count = 8;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i;
                const speed = 2 + Math.random() * 3;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 4 + Math.random() * 4,
                    color: color,
                    life: 1
                });
            }
        }

        // Clear canvas with animation
        function clearCanvas() {
            initAudio();
            playWhooshSound();
            
            const ctx = drawingCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            let opacity = 0;
            
            function fadeOut() {
                opacity += 0.05;
                ctx.fillStyle = `rgba(255,255,255,${opacity})`;
                ctx.fillRect(0, 0, rect.width, rect.height);
                
                if (opacity < 1) {
                    requestAnimationFrame(fadeOut);
                } else {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, rect.width, rect.height);
                    undoStack = [];
                    redoStack = [];
                }
            }
            
            fadeOut();
        }

        // Tool selection
        function selectTool(tool) {
            currentTool = tool;
            brushBtn.classList.toggle('selected', tool === 'brush');
            eraserBtn.classList.toggle('selected', tool === 'eraser');
            stampBtn.classList.toggle('selected', tool === 'stamp');
            fillBtn.classList.toggle('selected', tool === 'fill');
            tracingBtn.classList.toggle('selected', tool === 'tracing');
            bgBtn.classList.toggle('selected', tool === 'bg');
            
            closeAllPanels();
            
            if (tool === 'stamp') {
                togglePanel('stamp');
            } else if (tool === 'tracing') {
                togglePanel('tracing');
            } else if (tool === 'fill') {
                togglePanel('fill');
            } else if (tool === 'bg') {
                togglePanel('bg');
            }
            
            if (tool !== 'stamp') {
                selectedStamp = null;
            }
        }

        // Undo/Redo
        function undo() {
            if (undoStack.length === 0) return;
            const state = undoStack.pop();
            const ctx = drawingCanvas.getContext('2d');
            const currentState = ctx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
            redoStack.push(currentState);
            ctx.putImageData(state.data, 0, 0);
            playPopSound();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            const ctx = drawingCanvas.getContext('2d');
            const currentState = ctx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
            undoStack.push(currentState);
            ctx.putImageData(state.data, 0, 0);
            playPopSound();
        }

        // Save
        function saveDrawing() {
            const tempCanvas = document.createElement('canvas');
            const rect = canvasContainer.getBoundingClientRect();
            tempCanvas.width = bgCanvas.width;
            tempCanvas.height = bgCanvas.height;
            const ctx = tempCanvas.getContext('2d');
            
            ctx.fillStyle = currentBackground === 'white' ? '#FFFFFF' : 
                            currentBackground === 'sky' ? '#A5D8FF' :
                            currentBackground === 'grass' ? '#69DB7C' :
                            currentBackground === 'beach' ? '#FFE066' :
                            currentBackground === 'night' ? '#1A1A2E' : '#FFFFFF';
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            ctx.drawImage(bgCanvas, 0, 0);
            ctx.drawImage(drawingCanvas, 0, 0);
            ctx.drawImage(stampCanvas, 0, 0);
            
            const link = document.createElement('a');
            link.download = 'drawing.png';
            link.href = tempCanvas.toDataURL();
            link.click();
            playPopSound();
        }

        // Event listeners
        function initEventListeners() {
            // Mouse events for drawing
            drawingCanvas.addEventListener('mousedown', startDrawing);
            drawingCanvas.addEventListener('mousemove', draw);
            drawingCanvas.addEventListener('mouseup', stopDrawing);
            drawingCanvas.addEventListener('mouseleave', stopDrawing);
            
            // Touch events
            drawingCanvas.addEventListener('touchstart', startDrawing, { passive: false });
            drawingCanvas.addEventListener('touchmove', draw, { passive: false });
            drawingCanvas.addEventListener('touchend', stopDrawing);
            
            // Stamp placement on canvas click
            drawingCanvas.addEventListener('click', (e) => {
                if (currentTool === 'stamp' && selectedStamp) {
                    const rect = drawingCanvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    placeStamp(x, y);
                }
            });

            // Stamp dragging
            stampCanvas.addEventListener('mousedown', (e) => {
                const rect = stampCanvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const hit = checkStampHit(x, y);
                if (hit) {
                    if (currentTool === 'eraser') {
                        deleteStamp(hit);
                    } else {
                        dragStamp = hit;
                        isDraggingStamp = true;
                        dragOffsetX = x - hit.x;
                        dragOffsetY = y - hit.y;
                    }
                }
            });

            stampCanvas.addEventListener('mousemove', (e) => {
                if (isDraggingStamp && dragStamp) {
                    const rect = stampCanvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    dragStamp.x = x - dragOffsetX;
                    dragStamp.y = y - dragOffsetY;
                    renderStamps();
                }
            });

            stampCanvas.addEventListener('mouseup', () => {
                isDraggingStamp = false;
                dragStamp = null;
            });

            // Bubble canvas click
            bubbleCanvas.addEventListener('click', handleBubbleClick);
            
            // Coloring canvas click
            document.getElementById('coloringCanvas').addEventListener('click', handleColoringClick);
            
            // Header buttons
            bubblesBtn.addEventListener('click', toggleBubbleMode);
            coloringBtn.addEventListener('click', enterColoringGame);
            
            // Tool buttons
            brushBtn.addEventListener('click', () => { initAudio(); playPopSound(); selectTool('brush'); });
            eraserBtn.addEventListener('click', () => { initAudio(); playPopSound(); selectTool('eraser'); });
            stampBtn.addEventListener('click', () => { initAudio(); playPopSound(); selectTool('stamp'); });
            fillBtn.addEventListener('click', () => { initAudio(); playPopSound(); selectTool('fill'); });
            tracingBtn.addEventListener('click', () => { initAudio(); playPopSound(); selectTool('tracing'); });
            bgBtn.addEventListener('click', () => { initAudio(); playPopSound(); selectTool('bg'); });
            clearBtn.addEventListener('click', clearCanvas);
            undoBtn.addEventListener('click', undo);
            redoBtn.addEventListener('click', redo);
            saveBtn.addEventListener('click', saveDrawing);
            
            // Resize
            window.addEventListener('resize', resizeCanvas);
            
            // Initialize canvas with white background
            const ctx = drawingCanvas.getContext('2d');
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, drawingCanvas.width, drawingCanvas.height);
        }

        // Initialize
        function init() {
            initColorPalette();
            initStampPanel();
            initTracingPanel();
            initBackgroundPanel();
            resizeCanvas();
            initEventListeners();
            initColoringGame();
            
            const ctx = drawingCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, rect.width, rect.height);
        }

        init();
    </script>
</body>
</html>
