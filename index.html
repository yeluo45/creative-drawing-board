<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Creative Drawing Board for Toddlers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comic Neue', cursive, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE4EC 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* Header */
        .header {
            height: 50px;
            background: linear-gradient(180deg, #FF9A9E 0%, #FECFEF 100%);
            border-bottom: 3px solid #495057;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-size: 1.4rem;
            color: #495057;
            font-weight: bold;
            text-shadow: 1px 1px 0 white;
        }

        .header-btns {
            display: flex;
            gap: 8px;
        }

        .bubbles-btn, .coloring-btn {
            background: linear-gradient(180deg, #74C0FC 0%, #4DABF7 100%);
            border: 3px solid #495057;
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 3px 3px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            min-width: 80px;
            min-height: 44px;
            font-family: inherit;
        }

        .sound-btn {
            background: linear-gradient(180deg, #FFE066 0%, #FFD43B 100%);
            border: 3px solid #495057;
            border-radius: 16px;
            padding: 8px 12px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 3px 3px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            min-width: 44px;
            min-height: 44px;
        }

        .sound-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #495057;
        }

        .stats-btn {
            background: linear-gradient(180deg, #69DB7C 0%, #40C057 100%);
            border: 3px solid #495057;
            border-radius: 16px;
            padding: 8px 12px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 3px 3px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            min-width: 44px;
            min-height: 44px;
        }

        .stats-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #495057;
        }

        .gallery-btn {
            background: linear-gradient(180deg, #B197FC 0%, #9775FA 100%);
            border: 3px solid #495057;
            border-radius: 16px;
            padding: 8px 12px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 3px 3px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            min-width: 44px;
            min-height: 44px;
        }

        .gallery-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #495057;
        }

        .bubbles-btn:active, .coloring-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #495057;
        }

        .bubbles-btn.active {
            background: linear-gradient(180deg, #69DB7C 0%, #40C057 100%);
            box-shadow: 3px 3px 0 #495057, inset 0 0 0 3px white;
        }

        .coloring-btn {
            background: linear-gradient(180deg, #B197FC 0%, #9775FA 100%);
        }

        /* Canvas Container */
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #tracingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #drawingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: crosshair;
        }

        #fillCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        #stampCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* P1: Stamp layer for DOM-based editable stamps */
        #stampLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        #stampLayer .stamp-wrapper {
            position: absolute;
            pointer-events: auto;
            cursor: move;
            transform-origin: center center;
        }

        #stampLayer .stamp-wrapper.selected {
            outline: 3px dashed #4DABF7;
            outline-offset: 4px;
        }

        #stampLayer .stamp-wrapper svg {
            display: block;
            width: 60px;
            height: 60px;
        }

        #stampLayer .stamp-controls {
            position: absolute;
            top: -44px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            background: white;
            border: 2px solid #495057;
            border-radius: 12px;
            padding: 4px 6px;
            box-shadow: 2px 2px 0 #495057;
            white-space: nowrap;
            pointer-events: auto;
        }

        #stampLayer .stamp-ctrl-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid #495057;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: transform 0.1s;
        }

        #stampLayer .stamp-ctrl-btn:active {
            transform: scale(0.95);
        }

        #stampLayer .stamp-ctrl-btn.delete-btn {
            background: #FF6B6B;
            color: white;
        }

        #stampLayer .stamp-ctrl-btn.scale-up-btn {
            background: #69DB7C;
            color: white;
        }

        #stampLayer .stamp-ctrl-btn.scale-down-btn {
            background: #74C0FC;
            color: white;
        }

        #stampLayer .stamp-ctrl-btn.rotate-btn {
            background: #FFE066;
        }

        #stampLayer .stamp-ctrl-btn.front-btn {
            background: #B197FC;
            color: white;
        }

        #stampLayer .stamp-ctrl-btn.back-btn {
            background: #F783AC;
            color: white;
        }

        #bubbleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .canvas-container.bubble-mode #bubbleCanvas {
            pointer-events: auto;
        }

        /* Bubble Game UI */
        .bubble-game-ui {
            position: absolute;
            top: 55px;
            left: 10px;
            z-index: 15;
            pointer-events: none;
        }

        .bubble-score-display {
            font-size: 1.1rem;
            font-weight: bold;
            color: #495057;
            text-shadow: 1px 1px 0 white, -1px -1px 0 white;
            background: rgba(255,255,255,0.85);
            padding: 6px 12px;
            border-radius: 12px;
            border: 2px solid #495057;
            box-shadow: 2px 2px 0 #495057;
        }

        .bubble-combo-display {
            font-size: 0.9rem;
            color: #FF6B6B;
            font-weight: bold;
            margin-top: 4px;
            text-shadow: 1px 1px 0 white;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bubble-combo-display.active {
            opacity: 1;
        }

        .bubble-game-over-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 4px solid #495057;
            border-radius: 20px;
            padding: 24px 32px;
            z-index: 20;
            text-align: center;
            box-shadow: 6px 6px 0 #495057;
            display: none;
        }

        .bubble-game-over-panel.show {
            display: block;
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .bubble-game-over-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #495057;
            margin-bottom: 12px;
        }

        .bubble-game-over-score {
            font-size: 1.4rem;
            color: #FF6B6B;
            margin-bottom: 8px;
        }

        .bubble-game-over-high {
            font-size: 1rem;
            color: #74C0FC;
            margin-bottom: 16px;
        }

        .bubble-new-record {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFE066;
            text-shadow: 2px 2px 0 #FF6B6B;
            animation: newRecordPulse 0.6s ease-in-out infinite alternate;
            display: none;
        }

        .bubble-new-record.show {
            display: block;
        }

        @keyframes newRecordPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .bubble-continue-btn {
            background: linear-gradient(180deg, #69DB7C 0%, #40C057 100%);
            border: 3px solid #495057;
            border-radius: 12px;
            padding: 10px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 3px 3px 0 #495057;
            margin-top: 12px;
            pointer-events: auto;
        }

        .bubble-continue-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #495057;
        }

        .bubble-reward-popup {
            position: absolute;
            background: linear-gradient(135deg, #FFE066 0%, #FFA94D 100%);
            border: 3px solid #495057;
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #495057;
            z-index: 16;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 2px 2px 0 #495057;
            animation: rewardFloat 2s ease-out forwards;
        }

        @keyframes rewardFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.1); }
        }

        /* Panels */
        .panel {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 3px solid #495057;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 4px 4px 0 #495057;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 8px;
        }

        .panel-item {
            width: 60px;
            height: 60px;
            border: 2px solid #495057;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.1s;
        }

        .panel-item:hover, .panel-item.selected {
            background: #FFE066;
            transform: scale(1.05);
        }

        .panel-item svg {
            width: 40px;
            height: 40px;
        }

        .panel-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .panel-nav-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #495057;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        .panel-close {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #495057;
            background: #FF6B6B;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tracing Panel */
        #tracingPanel .panel-grid {
            grid-template-columns: repeat(4, 70px);
        }

        .panel-item.tracing-item {
            width: 70px;
            height: 70px;
            font-size: 0.7rem;
            text-align: center;
            padding: 4px;
        }

        /* Coloring Game Overlay */
        #coloringOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE4EC 100%);
            z-index: 1000;
            flex-direction: column;
        }

        #coloringOverlay.active {
            display: flex;
        }

        .coloring-header {
            height: 50px;
            background: linear-gradient(180deg, #B197FC 0%, #9775FA 100%);
            border-bottom: 3px solid #495057;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .coloring-title {
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0 #495057;
        }

        .coloring-canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #coloringCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .coloring-tools {
            height: 60px;
            background: linear-gradient(180deg, #FFE4EC 0%, #FFF8E7 100%);
            border-top: 3px solid #495057;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px;
        }

        .coloring-btn {
            padding: 8px 20px;
            border-radius: 12px;
            border: 3px solid #495057;
            background: white;
            cursor: pointer;
            box-shadow: 2px 2px 0 #495057;
            font-size: 1rem;
            font-weight: bold;
            color: #495057;
            font-family: inherit;
            min-height: 44px;
        }

        .coloring-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #495057;
        }

        .coloring-btn.done-btn {
            background: #69DB7C;
            color: white;
        }

        .coloring-btn.reset-btn {
            background: #FFA94D;
            color: white;
        }

        .coloring-btn.back-btn {
            background: #74C0FC;
            color: white;
        }

        /* Gallery Overlay */
        #galleryOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #galleryOverlay.active {
            display: flex;
        }

        .gallery-header {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            gap: 12px;
            padding: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .gallery-item {
            width: 80px;
            height: 80px;
            border: 3px solid #495057;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #495057;
            background: #FF6B6B;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .gallery-item:hover .delete-btn {
            opacity: 1;
        }

        .gallery-empty {
            color: white;
            font-size: 1.2rem;
            text-align: center;
            padding: 40px;
        }

        .gallery-close {
            margin-top: 16px;
            padding: 12px 32px;
            border-radius: 12px;
            border: 3px solid #495057;
            background: #74C0FC;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0 #495057;
            font-family: inherit;
        }

        .gallery-close:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #495057;
        }

        /* Full Image View Overlay */
        #fullImageOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        #fullImageOverlay.active {
            display: flex;
        }

        #fullImageOverlay img {
            max-width: 90%;
            max-height: 90%;
            border: 4px solid white;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #fullImageOverlay .close-full {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            background: #FF6B6B;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #fullImageOverlay .download-full {
            position: absolute;
            bottom: 20px;
            padding: 12px 24px;
            border-radius: 12px;
            border: 3px solid #495057;
            background: #69DB7C;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0 #495057;
            font-family: inherit;
        }

        /* Complete Overlay */
        #completeOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        #completeOverlay.active {
            display: flex;
        }

        .complete-box {
            background: white;
            border: 4px solid #495057;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            box-shadow: 8px 8px 0 #495057;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .complete-text {
            font-size: 2rem;
            font-weight: bold;
            color: #69DB7C;
            margin-bottom: 16px;
        }

        .complete-stars {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        /* Color Palette */
        .color-palette {
            height: 60px;
            background: linear-gradient(180deg, #FFF8E7 0%, #FFE4EC 100%);
            border-top: 3px solid #495057;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px;
        }

        .color-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid #495057;
            cursor: pointer;
            box-shadow: 2px 2px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            flex-shrink: 0;
        }

        .color-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #495057;
        }

        .color-btn.selected {
            box-shadow: 0 0 0 3px #495057, 0 0 0 6px white, 3px 3px 0 #495057;
        }

        /* Tools */
        .tools {
            height: 60px;
            background: linear-gradient(180deg, #FFE4EC 0%, #FFF8E7 100%);
            border-top: 3px solid #495057;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
        }

        .tool-btn {
            padding: 6px 10px;
            border-radius: 10px;
            border: 3px solid #495057;
            background: white;
            cursor: pointer;
            box-shadow: 2px 2px 0 #495057;
            transition: transform 0.1s, box-shadow 0.1s;
            font-size: 0.8rem;
            font-weight: bold;
            color: #495057;
            font-family: inherit;
            min-width: 56px;
            min-height: 44px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .tool-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #495057;
        }

        .tool-btn.selected {
            background: #FFE066;
        }

        .tool-btn.brush-btn.selected {
            background: #69DB7C;
            color: white;
        }

        .tool-btn.eraser-btn.selected {
            background: #74C0FC;
        }

        .tool-btn.stamp-btn.selected {
            background: #F783AC;
        }

        .tool-btn.fill-btn.selected {
            background: #4DABF7;
        }

        .tool-btn.tracing-btn.selected {
            background: #9775FA;
            color: white;
        }

        .tool-btn.bg-btn.selected {
            background: #FFA94D;
        }

        .tool-icon {
            font-size: 1.2rem;
        }

        .spacer {
            flex: 1;
        }

        .clear-btn {
            background: #FF6B6B;
            color: white;
        }

        .clear-btn:active {
            background: #fa5252;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 0; }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 0.5s ease-out forwards;
        }

        @keyframes particleFade {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* Backgrounds */
        .bg-white { background: #FFFFFF; }
        .bg-sky { background: linear-gradient(180deg, #74C0FC 0%, #A5D8FF 100%); }
        .bg-grass { background: linear-gradient(180deg, #8CE99A 0%, #69DB7C 100%); }
        .bg-beach { background: linear-gradient(180deg, #74C0FC 30%, #FFA94D 60%, #FFE066 100%); }
        .bg-night { background: linear-gradient(180deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%); }
        .bg-checker {
            background-image: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
            background-color: #FFFFFF;
        }
        .bg-space {
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0d0d1a 60%, #000010 100%);
            background-color: #0d0d1a;
        }
        .bg-underwater {
            background: linear-gradient(180deg, #74C0FC 0%, #A5D8FF 40%, #74C0FC 100%);
            background-color: #A5D8FF;
        }
        .bg-forest {
            background: linear-gradient(180deg, #87CEEB 0%, #8CE99A 40%, #69DB7C 100%);
            background-color: #69DB7C;
        }
        .bg-sunset {
            background: linear-gradient(180deg, #1A1A2E 0%, #E5997F 40%, #FFA94D 70%, #FFE066 100%);
            background-color: #FFE066;
        }

        /* Stats & Achievements Overlay */
        #statsOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        #statsOverlay.active {
            display: flex;
        }

        .stats-container {
            background: white;
            border: 4px solid #495057;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 8px 8px 0 #495057;
            animation: popIn 0.3s ease-out;
        }

        .stats-header {
            background: linear-gradient(180deg, #69DB7C 0%, #40C057 100%);
            border-bottom: 3px solid #495057;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stats-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 #495057;
        }

        .stats-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #495057;
            background: #FF6B6B;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats-tabs {
            display: flex;
            border-bottom: 2px solid #dee2e6;
        }

        .stats-tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: white;
            font-size: 1rem;
            font-weight: bold;
            font-family: inherit;
            color: #868e96;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .stats-tab.active {
            color: #40C057;
            border-bottom-color: #40C057;
        }

        .stats-content {
            padding: 16px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .stat-row {
            display: flex;
            align-items: center;
            padding: 10px 8px;
            border-bottom: 1px solid #dee2e6;
            font-size: 1rem;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-icon {
            font-size: 1.2rem;
            margin-right: 10px;
            width: 30px;
            text-align: center;
        }

        .stat-row span:nth-child(2) {
            flex: 1;
            color: #495057;
        }

        .stat-row span:last-child {
            font-weight: bold;
            color: #40C057;
            font-size: 1.1rem;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .achievement-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            border: 3px solid #dee2e6;
            border-radius: 12px;
            background: #f8f9fa;
            transition: all 0.3s;
        }

        .achievement-badge.unlocked {
            border-color: #FFE066;
            background: linear-gradient(180deg, #FFF9DB 0%, #FFF0AB 100%);
            box-shadow: 2px 2px 0 #495057;
        }

        .achievement-badge.locked {
            opacity: 0.6;
            filter: grayscale(0.8);
        }

        .achievement-icon {
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .achievement-name {
            font-size: 0.7rem;
            font-weight: bold;
            color: #495057;
            text-align: center;
            line-height: 1.2;
        }

        .achievement-badge.locked .achievement-name {
            color: #868e96;
        }

        .achievement-desc {
            font-size: 0.6rem;
            color: #868e96;
            text-align: center;
            margin-top: 4px;
        }

        .achievement-badge.unlocked .achievement-desc {
            color: #40C057;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-title">Creative Drawing Board</div>

            <button class="sound-btn" id="soundBtn" title="Sound On">🔊</button>
            <button class="stats-btn" id="statsBtn" title="Stats & Achievements">📊</button>
            <button class="bubbles-btn" id="bubblesBtn">Bubbles</button>
            <button class="coloring-btn" id="coloringBtn">Coloring</button>
            <button class="gallery-btn" id="galleryBtn" title="Gallery">🖼️</button>
        </div>
    </header>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="bgCanvas"></canvas>
        <canvas id="tracingCanvas"></canvas>
        <canvas id="drawingCanvas"></canvas>
        <canvas id="fillCanvas"></canvas>
        <canvas id="stampCanvas"></canvas>
        <canvas id="bubbleCanvas"></canvas>
        <div class="bubble-game-ui" id="bubbleGameUI">
            <div class="bubble-score-display">
                <div id="bubbleScoreText">Score: 0</div>

            </div>
            <div class="bubble-combo-display" id="bubbleComboDisplay">Combo x1.0</div>
        </div>
        <div class="bubble-game-over-panel" id="bubbleGameOverPanel">
            <div class="bubble-game-over-title">Game Over!</div>
            <div class="bubble-new-record" id="bubbleNewRecord">NEW RECORD!</div>
            <div class="bubble-game-over-score" id="bubbleFinalScore">Score: 0</div>
            <div class="bubble-game-over-high" id="bubbleFinalHigh">Best: 0</div>
            <button class="bubble-continue-btn" id="bubbleContinueBtn">Continue</button>
        </div>

        <!-- P1: DOM container for placed stamps (editable) -->
        <div id="stampLayer"></div>

        <!-- Stamp Panel -->
        <div class="panel" id="stampPanel">
            <button class="panel-close" onclick="closeAllPanels()">×</button>
            <div class="panel-grid" id="stampGrid"></div>
        </div>
        
        <!-- Tracing Panel -->
        <div class="panel" id="tracingPanel">
            <button class="panel-close" onclick="closeAllPanels()">×</button>
            <div class="panel-grid" id="tracingGrid"></div>
            <div class="panel-nav">
                <button class="panel-nav-btn" onclick="prevTracing()">◀ Prev</button>

                <button class="panel-nav-btn" onclick="clearTracingLines()">Clear Lines</button>
                <button class="panel-nav-btn" onclick="nextTracing()">Next ▶</button>
            </div>
        </div>
        
        <!-- Fill Panel -->
        <div class="panel" id="fillPanel">
            <button class="panel-close" onclick="closeAllPanels()">×</button>
            <div style="text-align:center;padding:8px;font-weight:bold;color:#495057;">
                Tap canvas to fill area with selected color
            </div>
        </div>
        
        <!-- Background Panel -->
        <div class="panel" id="bgPanel">
            <button class="panel-close" onclick="closeAllPanels()">×</button>
            <div class="panel-grid" id="bgGrid"></div>
        </div>
    </div>

    <div class="color-palette" id="colorPalette">
        <!-- Colors injected by JS -->
    </div>

    <div class="tools">
        <button class="tool-btn brush-btn selected" id="brushBtn">
            <span class="tool-icon">✏️</span>
            <span>Brush</span>
        </button>
        <button class="tool-btn stamp-btn" id="stampBtn">
            <span class="tool-icon">🎨</span>
            <span>Sticker</span>
        </button>
        <button class="tool-btn fill-btn" id="fillBtn">
            <span class="tool-icon">🪣</span>
            <span>Fill</span>
        </button>
        <button class="tool-btn tracing-btn" id="tracingBtn">
            <span class="tool-icon">📝</span>
            <span>Tracing</span>
        </button>
        <button class="tool-btn bg-btn" id="bgBtn">
            <span class="tool-icon">🖼️</span>
            <span>BG</span>
        </button>
        <button class="tool-btn eraser-btn" id="eraserBtn">
            <span class="tool-icon">🧹</span>
            <span>Eraser</span>

        <button class="tool-btn" id="saveBtn" title="Save">💾</button>

        <div class="coloring-header">
            <div class="coloring-title" id="coloringTitle">Coloring Page</div>

        // Load sound preference from localStorage

            if (saved !== null) {

            localStorage.setItem('drawing_board_sound', soundEnabled);
        }

        // Toggle sound on/off

            soundEnabled = !soundEnabled;
            saveSoundPreference();
            updateSoundButton();
            if (soundEnabled) {
                initAudio();
                playBtnClick();
            }
        }

            const btn = document.getElementById('soundBtn');

                btn.title = soundEnabled ? 'Sound On' : 'Sound Off';
            }
        }

        // Initialize AudioContext on first user interaction
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Play sound only if soundEnabled is true
        function playSound(soundFn) {
            if (soundEnabled && soundFn) {
                soundFn();
            }

        // 1. btn_click: 440Hz sine 50ms
        function playBtnClick() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

            osc2.frequency.setValueAtTime(1047, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc1.start();
            osc2.start();
            osc1.stop(audioCtx.currentTime + 0.2);
            osc2.stop(audioCtx.currentTime + 0.2);

        // 7. bubble_pop: white noise burst 100ms
        function playBubblePop() {
            initAudio();
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
        }

        // Canvas setup

        function drawBackground() {
            const ctx = bgCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            if (currentBackground === 'night') {
                // Draw stars
                ctx.fillStyle = '#FFFFFF';
                for (let i = 0; i < 50; i++) {
                    const x = Math.random() * rect.width;
                    const y = Math.random() * rect.height * 0.6;
                    const size = Math.random() * 2 + 1;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (currentBackground === 'sky') {
                // Draw clouds
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                drawCloud(ctx, rect.width * 0.2, rect.height * 0.15, 40);
                drawCloud(ctx, rect.width * 0.6, rect.height * 0.1, 50);
                drawCloud(ctx, rect.width * 0.8, rect.height * 0.2, 35);
            } else if (currentBackground === 'beach') {
                // Draw waves
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, rect.height * 0.35 + i * 15);
                    for (let x = 0; x < rect.width; x += 20) {
                        ctx.quadraticCurveTo(x + 10, rect.height * 0.35 + i * 15 - 5, x + 20, rect.height * 0.35 + i * 15);
                    }
                    ctx.stroke();
                }
            }
        }

        function drawCloud(ctx, x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        // Drawing functions
        function getPos(e) {
            const rect = drawingCanvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function saveUndoState() {
            const ctx = drawingCanvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
            undoStack.push(imageData);
            redoStack = [];
            if (undoStack.length > 50) undoStack.shift();
        }

        function startDrawing(e) {
            if (bubbleMode) return;
            if (currentTool === 'stamp' && selectedStamp) return;
            
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;

            if (currentTool === 'fill') {
                performFloodFill(pos.x, pos.y);
                isDrawing = false;
                return;
            }

            if (currentTool === 'brush' || currentTool === 'eraser') {
                saveUndoState();
                trackDrawing();
            }

            if (currentTool === 'tracing' && currentTracing >= 0) {
                trackTracing();
            }
        }

        function draw(e) {
            if (!isDrawing || bubbleMode) return;
            e.preventDefault();
            
            const pos = getPos(e);
            const ctx = drawingCanvas.getContext('2d');
            
            ctx.beginPath();
            ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor;
            ctx.lineWidth = currentSize;
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // ===== M3: Flood Fill =====
        function performFloodFill(startX, startY) {
            const ctx = drawingCanvas.getContext('2d');
            const fillCtx = fillCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvasContainer.getBoundingClientRect();
            
            // Limit fill area to 500x500
            const size = 500;
            const offsetX = Math.max(0, Math.floor(startX - size / 2));
            const offsetY = Math.max(0, Math.floor(startY - size / 2));
            const actualSize = Math.min(size, Math.floor(rect.width - offsetX), Math.floor(rect.height - offsetY));
            
            if (actualSize < 1) return;

            saveUndoState();

            const imageData = ctx.getImageData(offsetX * dpr, offsetY * dpr, actualSize * dpr, actualSize * dpr);
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;

            const startPixelX = Math.floor(startX - offsetX);
            const startPixelY = Math.floor(startY - offsetY);
            const startIdx = (startPixelY * width + startPixelX) * 4;

            const startR = data[startIdx];
            const startG = data[startIdx + 1];
            const startB = data[startIdx + 2];
            const startA = data[startIdx + 3];

            const fillR = parseInt(currentColor.slice(1, 3), 16);
            const fillG = parseInt(currentColor.slice(3, 5), 16);
            const fillB = parseInt(currentColor.slice(5, 7), 16);

            // Don't fill if clicking on same color
            if (Math.abs(startR - fillR) < 10 && Math.abs(startG - fillG) < 10 && Math.abs(startB - fillB) < 10) return;

            const visited = new Uint8Array(width * height);
            const stack = [[startPixelX, startPixelY]];
            const threshold = 128;

            function matchesStart(idx) {
                const a = data[idx + 3];
                if (a < threshold) return false;
                const dr = Math.abs(data[idx] - startR);
                const dg = Math.abs(data[idx + 1] - startG);
                const db = Math.abs(data[idx + 2] - startB);
                return dr < 50 && dg < 50 && db < 50;
            }

            function matchesFill(idx) {
                return Math.abs(data[idx] - fillR) < 10 && Math.abs(data[idx + 1] - fillG) < 10 && Math.abs(data[idx + 2] - fillB) < 10;
            }

            while (stack.length > 0) {
                const [x, y] = stack.pop();
                if (x < 0 || x >= width || y < 0 || y >= height) continue;
                
                const pixelIdx = y * width + x;
                if (visited[pixelIdx]) continue;
                
                const idx = pixelIdx * 4;
                if (!matchesStart(idx) || matchesFill(idx)) continue;
                
                visited[pixelIdx] = 1;
                data[idx] = fillR;
                data[idx + 1] = fillG;
                data[idx + 2] = fillB;
                data[idx + 3] = 255;

                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }

            ctx.putImageData(imageData, offsetX * dpr, offsetY * dpr);
            playSound(playFillComplete);
            trackBubbleUse();
        }

        // ===== P1: DOM-based Stamp Editing =====

        // Get stamp layer element
        function getStampLayer() {
            return document.getElementById('stampLayer');
        }

        // Create a stamp wrapper DOM element
        function createStampElement(stamp) {
            const wrapper = document.createElement('div');
            wrapper.className = 'stamp-wrapper';
            wrapper.dataset.stampId = stamp.id;
            wrapper.innerHTML = stamp.svg;

            // Apply transform via CSS
            updateStampElementTransform(wrapper, stamp);

            // Mousedown to start drag or select
            wrapper.addEventListener('mousedown', function(e) {
                if (e.target.classList.contains('stamp-ctrl-btn')) return;
                e.stopPropagation();

                // Select this stamp
                selectPlacedStamp(stamp);

                // Start dragging
                isDraggingStamp = true;
                dragStamp = stamp;
                const rect = wrapper.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
            });

            // Touch support
            wrapper.addEventListener('touchstart', function(e) {
                if (e.target.classList.contains('stamp-ctrl-btn')) return;
                e.stopPropagation();

                selectPlacedStamp(stamp);

                isDraggingStamp = true;
                dragStamp = stamp;
                const touch = e.touches[0];
                const rect = wrapper.getBoundingClientRect();
                dragOffsetX = touch.clientX - rect.left;
                dragOffsetY = touch.clientY - rect.top;
            }, { passive: true });

            return wrapper;
        }

        // Update a stamp wrapper's CSS transform
        function updateStampElementTransform(wrapper, stamp) {
            const size = 60 * stamp.scale;
            wrapper.style.width = size + 'px';
            wrapper.style.height = size + 'px';
            wrapper.style.left = stamp.x + 'px';
            wrapper.style.top = stamp.y + 'px';
            wrapper.style.transform = `rotate(${stamp.rotation || 0}deg)`;
        }

        // Place a new stamp at x, y
        function placeStamp(x, y) {
            if (!selectedStamp) return;

            const stamp = {
                id: Date.now(),
                type: selectedStamp.id,
                svg: selectedStamp.svg,
                x: x - 30,
                y: y - 30,
                scale: 1,
                rotation: 0
            };

            placedStamps.push(stamp);

            // Create DOM element
            const layer = getStampLayer();
            const wrapper = createStampElement(stamp);
            layer.appendChild(wrapper);

            // Select this new stamp
            selectPlacedStamp(stamp);

            saveUndoState();
            playSound(playStampPlace);
        }

        // Render all placed stamps as DOM elements
        function renderStamps() {
            const layer = getStampLayer();
            layer.innerHTML = '';

            placedStamps.forEach(stamp => {
                const wrapper = createStampElement(stamp);
                if (stamp === selectedPlacedStamp) {
                    wrapper.classList.add('selected');
                    appendControls(wrapper, stamp);
                }
                layer.appendChild(wrapper);
            });
        }

        // Append control buttons to a stamp wrapper
        function appendControls(wrapper, stamp) {
            const controls = document.createElement('div');
            controls.className = 'stamp-controls';

            controls.innerHTML = `
                <button class="stamp-ctrl-btn scale-up-btn" title="Scale Up">＋</button>
                <button class="stamp-ctrl-btn scale-down-btn" title="Scale Down">－</button>
                <button class="stamp-ctrl-btn rotate-btn" title="Rotate">↻</button>
                <button class="stamp-ctrl-btn front-btn" title="Bring to Front">⬆</button>
                <button class="stamp-ctrl-btn back-btn" title="Send to Back">⬇</button>
                <button class="stamp-ctrl-btn delete-btn" title="Delete">×</button>
            `;

            // Delete
            controls.querySelector('.delete-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                deleteStamp(stamp);
            });

            // Scale up
            controls.querySelector('.scale-up-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                stampScaleUp(stamp);
            });

            // Scale down
            controls.querySelector('.scale-down-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                stampScaleDown(stamp);
            });

            // Rotate
            controls.querySelector('.rotate-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                stampRotate(stamp);
            });

            // Bring to front
            controls.querySelector('.front-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                stampBringToFront(stamp);
            });

            // Send to back
            controls.querySelector('.back-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                stampSendToBack(stamp);
            });

            wrapper.appendChild(controls);
        }

        // Select a placed stamp
        function selectPlacedStamp(stamp) {
            selectedPlacedStamp = stamp;
            renderStamps();
        }

        // Deselect all stamps
        function deselectAllStamps() {
            selectedPlacedStamp = null;
            renderStamps();
        }

        // Check if a point hits any stamp (reverse order for top-most first)
        function checkStampHit(x, y) {
            for (let i = placedStamps.length - 1; i >= 0; i--) {
                const stamp = placedStamps[i];
                const size = 60 * stamp.scale;
                if (x >= stamp.x && x <= stamp.x + size && y >= stamp.y && y <= stamp.y + size) {
                    return stamp;
                }
            }
            return null;
        }

        // Delete a stamp
        function deleteStamp(stamp) {
            const idx = placedStamps.indexOf(stamp);
            if (idx >= 0) {
                placedStamps.splice(idx, 1);
                if (selectedPlacedStamp === stamp) {
                    selectedPlacedStamp = null;
                }
                renderStamps();
                saveUndoState();
                playSound(playStampRemove);
            }
        }

        // Scale up
        function stampScaleUp(stamp) {
            stamp.scale = Math.min(stamp.scale + 0.25, 5);
            renderStamps();
            saveUndoState();
        }

        // Scale down
        function stampScaleDown(stamp) {
            stamp.scale = Math.max(stamp.scale - 0.25, 0.25);
            renderStamps();
            saveUndoState();
        }

        // Rotate
        function stampRotate(stamp) {
            stamp.rotation = (stamp.rotation || 0) + 45;
            renderStamps();
            saveUndoState();
        }

        // Bring to front
        function stampBringToFront(stamp) {
            const idx = placedStamps.indexOf(stamp);
            if (idx >= 0 && idx < placedStamps.length - 1) {
                placedStamps.splice(idx, 1);
                placedStamps.push(stamp);
                renderStamps();
                saveUndoState();
            }
        }

        // Send to back
        function stampSendToBack(stamp) {
            const idx = placedStamps.indexOf(stamp);
            if (idx > 0) {
                placedStamps.splice(idx, 1);
                placedStamps.unshift(stamp);
                renderStamps();
                saveUndoState();
            }
        }

        // Update stamp dragging
        function updateStampDrag(e) {
            if (!isDraggingStamp || !dragStamp) return;

            const rect = canvasContainer.getBoundingClientRect();
            let clientX, clientY;

            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const x = clientX - rect.left;
            const y = clientY - rect.top;

            dragStamp.x = x - dragOffsetX;
            dragStamp.y = y - dragOffsetY;

            // Update only the wrapper's position without re-rendering everything
            const wrapper = getStampLayer().querySelector(`[data-stamp-id="${dragStamp.id}"]`);
            if (wrapper) {
                const size = 60 * dragStamp.scale;
                wrapper.style.left = dragStamp.x + 'px';
                wrapper.style.top = dragStamp.y + 'px';
            }
        }

        // Stop stamp dragging
        function stopStampDrag() {
            if (isDraggingStamp) {
                isDraggingStamp = false;
                if (dragStamp) {
                    saveUndoState();
                }
                dragStamp = null;
            }
        }

        // ===== M2: Tracing =====
        function initTracingPanel() {
            const grid = document.getElementById('tracingGrid');
            TRACING_TEMPLATES.forEach((template, index) => {
                const item = document.createElement('div');
                item.className = 'panel-item tracing-item';
                item.innerHTML = `<span>${template.name}</span>`;
                item.addEventListener('click', () => selectTracing(index));
                grid.appendChild(item);
            });
        }

        function selectTracing(index) {
            currentTracing = index;
            closeAllPanels();
            drawTracing();
            tracingBtn.classList.add('selected');
            playSound(playBtnClick);
        }

        function drawTracing() {
            const ctx = tracingCanvas.getContext('2d');
            const rect = canvasContainer.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            if (currentTracing < 0 || !tracingVisible) return;

            const template = TRACING_TEMPLATES[currentTracing];
            const scale = Math.min(rect.width, rect.height) / 100;
            const offsetX = rect.width / 2 - 50 * scale;
            const offsetY = rect.height / 2 - 50 * scale;

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            ctx.strokeStyle = '#495057';
            ctx.lineWidth = 3 / scale;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = 0.4;

            template.paths.forEach(path => {
                ctx.beginPath();
                switch (path.type) {
                    case 'move':
                        ctx.moveTo(path.x, path.y);
                        break;
                    case 'line':
                        ctx.lineTo(path.x, path.y);
                        break;
                    case 'arc':
                        ctx.arc(path.x, path.y, path.r, path.start, path.end);
                        break;
                    case 'bezier':
                        ctx.bezierCurveTo(path.x1, path.y1, path.x2, path.y2, path.x, path.y);
                        break;
                    case 'rect':
                        ctx.rect(path.x, path.y, path.w, path.h);
                        break;
                    case 'ellipse':
                        ctx.ellipse(path.cx, path.cy, path.rx, path.ry, 0, 0, Math.PI * 2);
                        break;
                }
                ctx.stroke();
            });

            ctx.restore();
        }

        function prevTracing() {
            if (currentTracing > 0) {
                currentTracing--;
                drawTracing();
                playSound(playBtnClick);
            }
        }

        function nextTracing() {
            if (currentTracing < TRACING_TEMPLATES.length - 1) {
                currentTracing++;
                drawTracing();
                playSound(playBtnClick);
            }
        }

        function toggleTracingVisibility() {
            tracingVisible = !tracingVisible;
            drawTracing();
            playSound(playBtnClick);
        }

        function clearTracingLines() {
            saveUndoState();
            playSound(playBgSwitch);
        }

        // ===== Panels =====
        function closeAllPanels() {

        // ===== M5: Coloring Game =====
        function initColoringGame() {
            coloringCanvas = document.getElementById('coloringCanvas');
            coloringRegions = JSON.parse(JSON.stringify(COLORING_PAGES[coloringPage].regions));
            renderColoringPage();
        }

        function enterColoringGame() {
            coloringPage = 0;
            coloringRegions = JSON.parse(JSON.stringify(COLORING_PAGES[coloringPage].regions));
            document.getElementById('coloringTitle').textContent = COLORING_PAGES[coloringPage].name;
            document.getElementById('coloringOverlay').classList.add('active');
            
            const wrap = document.getElementById('coloringWrap');
            coloringCanvas.width = wrap.offsetWidth;
            coloringCanvas.height = wrap.offsetHeight;
            
            renderColoringPage();
            playSound(playBtnClick);
        }

        function exitColoringGame() {
            document.getElementById('coloringOverlay').classList.remove('active');
            playSound(playBtnClick);
        }

        function renderColoringPage() {
            if (!coloringCanvas) return;
            
            const ctx = coloringCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            ctx.clearRect(0, 0, coloringCanvas.width, coloringCanvas.height);

            const page = COLORING_PAGES[coloringPage];
            const scale = Math.min(coloringCanvas.width / dpr, coloringCanvas.height / dpr) / 100;
            const offsetX = (coloringCanvas.width / dpr - 100 * scale) / 2;
            const offsetY = (coloringCanvas.height / dpr - 100 * scale) / 2;

            ctx.save();
            ctx.translate(offsetX * dpr, offsetY * dpr);
            ctx.scale(scale * dpr, scale * dpr);

            // Draw background
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, 100, 100);

            // Draw regions
            coloringRegions.forEach(region => {
                ctx.beginPath();
                const path = new Path2D(region.path);
                ctx.fillStyle = region.color;
                ctx.fill(path, region.fillRule || 'evenodd');
                
                // Draw stroke for unfilled regions
                if (region.color === 'white' || region.color === '#FFFFFF') {
                    ctx.strokeStyle = '#495057';
                    ctx.lineWidth = 2;
                    ctx.stroke(path);
                }
            });

            ctx.restore();
        }

        function handleColoringClick(e) {
            const rect = coloringCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const dpr = window.devicePixelRatio || 1;

            const page = COLORING_PAGES[coloringPage];
            const scale = Math.min(coloringCanvas.width / dpr, coloringCanvas.height / dpr) / 100;
            const offsetX = (coloringCanvas.width / dpr - 100 * scale) / 2;
            const offsetY = (coloringCanvas.height / dpr - 100 * scale) / 2;

            const pathX = (x / dpr - offsetX) / scale;
            const pathY = (y / dpr - offsetY) / scale;

            // Check if clicked inside a region
            const ctx = coloringCanvas.getContext('2d');
            
            for (let i = 0; i < coloringRegions.length; i++) {
                const region = coloringRegions[i];
                const path = new Path2D(region.path);
                
                if (ctx.isPointInPath(path, pathX, pathY)) {
                    region.color = currentColor;
                    renderColoringPage();
                    playSound(playBtnClick);
                    trackColoring();
                    break;
                }
            }
        }

        function completeColoring() {
            document.getElementById('completeOverlay').classList.add('active');
            playSound(playColoringComplete);
        }

        function closeComplete() {
            document.getElementById('completeOverlay').classList.remove('active');

                coloringRegions = JSON.parse(JSON.stringify(COLORING_PAGES[coloringPage].regions));

        function resetColoring() {

        // ===== M5 Enhanced: Bubble Game V5 =====
        function loadBubbleStats() {
            try {
                bubbleHighScore = parseInt(localStorage.getItem('bubble_high_score') || '0');
            } catch (e) { bubbleHighScore = 0; }
        }

        function saveBubbleStats() {
            try {

                recent.unshift(bubbleScore);

                localStorage.setItem('bubble_recent_scores', JSON.stringify(recent));

            } catch (e) {}
        }

        function updateBubbleScoreDisplay() {

            document.getElementById('bubbleHighScoreText').textContent = 'Best: ' + bubbleHighScore;

        function continueBubbleGame() {
            document.getElementById('bubbleGameOverPanel').classList.remove('show');
            bubbleScore = 0;

            bubbleGameOver = false;
            bubbleLastRewardScore = 0;

        function getBubbleType() {
            const r = Math.random();
            if (r < 0.05) return 'star';
            if (r < 0.10) return 'rainbow';
            if (r < 0.20) return 'gold';
            return 'normal';
        }

        function getBubblePoints(type) {
            if (type === 'star') return 0;
            if (type === 'gold' || type === 'rainbow') return 5;
            return 1;
        }

        function getBubbleColor(type, baseColor) {
            if (type === 'gold') return '#FFD700';
            if (type === 'rainbow') return baseColor;
            return baseColor;
        }

        function spawnBubble() {
            if (!bubbleGameActive || bubbles.length >= 8) return;
            const rect = canvasContainer.getBoundingClientRect();
            const roll = Math.random();
            let type = 'normal';
            if (roll < 0.05) type = 'star';
            else if (roll < 0.10) type = 'rainbow';
            else if (roll < 0.20) type = 'gold';

            const radius = 15 + Math.random() * 25;
            const bubble = {
                x: Math.random() * rect.width,
                y: rect.height + radius + 10,
                radius: radius,
                type: type,
                baseColor: BUBBLE_COLORS[Math.floor(Math.random() * BUBBLE_COLORS.length)],
                wobbleOffset: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.5 + Math.random() * 0.5,
                riseSpeed: 1 + Math.random() * 1.5,
                opacity: 0.85,
                rainbowHue: 0
            };
            bubbles.push(bubble);
        }

        function popBubble(b, idx) {
            playSound(playBubblePop);
            createParticles(b.x, b.y, b.color || b.baseColor, b.radius * 0.6);
            bubbleAnimations.push({ x: b.x, y: b.y, radius: b.radius, alpha: 1, scale: 1 });
            const pts = getBubblePoints(b.type);
            if (pts > 0) {
                bubbleCombo++;
                const mult = Math.min(1 + (bubbleCombo - 1) * 0.1, 2);
                const earned = Math.round(pts * mult);
                bubbleScore += earned;
                bubbleFloatTexts.push({ x: b.x, y: b.y - 20, text: '+' + earned, alpha: 1, vy: -1.5, color: b.type === 'gold' ? '#FFD700' : '#FF6B6B' });
                if (bubbleScore > bubbleHighScore) {
                    bubbleHighScore = bubbleScore;
                }
                updateBubbleScoreDisplay();
                if (bubbleScore >= bubbleLastRewardScore + 50) {
                    bubbleLastRewardScore = Math.floor(bubbleScore / 50) * 50;
                    giveStickerReward(false);
                }
                if (bubbleScore >= bubbleLastRewardScore + 150 && bubbleLastRewardScore > 0) {
                    bubbleLastRewardScore += 150;
                    giveStickerReward(true);
                }
            } else if (b.type === 'star') {
                bubbleCombo++;
                bubbleFloatTexts.push({ x: b.x, y: b.y - 20, text: 'STAR!', alpha: 1, vy: -1.5, color: '#FFE066' });
                updateBubbleScoreDisplay();
                giveStickerReward(true);
            }
            bubbles.splice(idx, 1);
        }

        function giveStickerReward(rare) {
            const stampPool = STAMPS;
            if (rare) {
                const rareStamps = stampPool.filter(s => ['rocket', 'helicopter', 'train', 'truck', 'ship', 'airplane', 'watermelon', 'corn', 'donut', 'pizza'].includes(s.id));
                if (rareStamps.length > 0) {
                    const s = rareStamps[Math.floor(Math.random() * rareStamps.length)];
                    const rect = bubbleCanvas.getBoundingClientRect();
                    placedStamps.push({ ...s, x: rect.width / 2 - 30, y: rect.height / 2 - 30, scale: 1, rotation: 0 });
                    showBubbleRewardPopup('Rare: ' + s.name + '!', rare);
                }
            } else {
                const s = stampPool[Math.floor(Math.random() * stampPool.length)];
                const rect = bubbleCanvas.getBoundingClientRect();
                placedStamps.push({ ...s, x: rect.width / 2 - 30, y: rect.height / 2 - 30, scale: 1, rotation: 0 });
                showBubbleRewardPopup('Sticker: ' + s.name + '!', rare);
            }
        }

        function showBubbleRewardPopup(text, rare) {
            const popup = document.createElement('div');
            popup.className = 'bubble-reward-popup';
            popup.textContent = text;
            if (rare) popup.style.background = 'linear-gradient(135deg, #B197FC 0%, #F783AC 100%)';
            popup.style.left = (Math.random() * 60 + 20) + '%';
            popup.style.top = (Math.random() * 40 + 30) + '%';
            canvasContainer.appendChild(popup);
            setTimeout(() => { if (popup.parentNode) popup.parentNode.removeChild(popup); }, 2000);
        }

        function animateBubbles() {
            if (!bubbleMode) return;

            const ctx = bubbleCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvasContainer.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.y -= b.riseSpeed;
                b.wobbleOffset += 0.03;
                if (b.type === 'rainbow') b.rainbowHue = (b.rainbowHue + 2) % 360;

                if (b.y + b.radius < 0) {
                    bubbles.splice(i, 1);
                    if (bubbleGameActive) {
                        bubbleCombo = 0;
                        updateBubbleScoreDisplay();
                    }
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = b.opacity;

                if (b.type === 'gold') {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#FFD700';
                } else if (b.type === 'rainbow') {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = 'hsl(' + b.rainbowHue + ',80%,60%)';
                } else if (b.type === 'star') {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#FFE066';
                }

                const gradient = ctx.createRadialGradient(
                    b.x - b.radius * 0.3, b.y - b.radius * 0.3, 0,
                    b.x, b.y, b.radius
                );
                gradient.addColorStop(0, 'rgba(255,255,255,0.9)');

                let mainColor = b.baseColor;
                if (b.type === 'gold') mainColor = '#FFD700';
                else if (b.type === 'rainbow') mainColor = 'hsl(' + b.rainbowHue + ',80%,60%)';
                else if (b.type === 'star') mainColor = '#FFE066';

                gradient.addColorStop(0.5, mainColor + 'CC');
                gradient.addColorStop(1, mainColor + '44');

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(b.x - b.radius * 0.3, b.y - b.radius * 0.3, b.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fill();

                if (b.type === 'star') {
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(b.wobbleOffset * 0.5);
                    ctx.beginPath();
                    for (let si = 0; si < 5; si++) {
                        const angle = (si * Math.PI * 2 / 5) - Math.PI / 2;
                        const r = si % 2 === 0 ? b.radius * 0.5 : b.radius * 0.2;
                        if (si === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                        else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                        const nextAngle = ((si + 0.5) * Math.PI * 2 / 5) - Math.PI / 2;
                        const nextR = si % 2 === 0 ? b.radius * 0.2 : b.radius * 0.5;
                        ctx.lineTo(Math.cos(nextAngle) * nextR, Math.sin(nextAngle) * nextR);
                    }
                    ctx.closePath();
                    ctx.fillStyle = '#FFE066';
                    ctx.fill();
                    ctx.restore();
                } else if (b.type === 'rainbow') {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius * 0.5, 0, Math.PI * 2);
                    const rg = ctx.createLinearGradient(b.x - b.radius * 0.5, b.y, b.x + b.radius * 0.5, b.y);
                    rg.addColorStop(0, '#FF6B6B');
                    rg.addColorStop(0.2, '#FFA94D');
                    rg.addColorStop(0.4, '#FFE066');
                    rg.addColorStop(0.6, '#69DB7C');
                    rg.addColorStop(0.8, '#74C0FC');
                    rg.addColorStop(1, '#B197FC');
                    ctx.fillStyle = rg;
                    ctx.fill();
                    ctx.restore();
                }

                ctx.restore();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.025;
                p.radius *= 0.95;
                if (p.life <= 0 || p.radius < 1) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.restore();
            }

            for (let i = bubbleAnimations.length - 1; i >= 0; i--) {
                const a = bubbleAnimations[i];
                a.scale += 0.08;
                a.alpha -= 0.06;
                if (a.alpha <= 0) {
                    bubbleAnimations.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = a.alpha;
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.radius * a.scale, 0, Math.PI * 2);
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            }

            for (let i = bubbleFloatTexts.length - 1; i >= 0; i--) {
                const ft = bubbleFloatTexts[i];
                ft.y += ft.vy;
                ft.alpha -= 0.02;
                if (ft.alpha <= 0) {
                    bubbleFloatTexts.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = ft.alpha;
                ctx.font = 'bold 18px Comic Sans MS, cursive';
                ctx.fillStyle = ft.color;
                ctx.textAlign = 'center';
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            }

            if (bubbleGameActive) {
                const hasTopBubble = bubbles.some(b => b.y - b.radius < 40);
                if (hasTopBubble && bubbleScore > 0) {
                    showBubbleGameOver();
                }
            }

            requestAnimationFrame(animateBubbles);
        }

        function toggleBubbleMode() {
            initAudio();
            playSound(playBtnClick);
            bubbleMode = !bubbleMode;
            bubblesBtn.classList.toggle('active', bubbleMode);
            canvasContainer.classList.toggle('bubble-mode', bubbleMode);

            if (bubbleMode) {
                bubbleCtx = bubbleCanvas.getContext('2d');

                bubbleCombo = 0;
                bubbleGameOver = false;
                bubbleLastRewardScore = 0;

                bubbleFloatTexts = [];
                bubbleGameActive = true;
