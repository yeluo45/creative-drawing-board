name: Build Tauri App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          CI: true

      - name: Verify dist exists
        run: |
          if (!(Test-Path "dist")) { throw "dist folder not found" }
          if (!(Test-Path "dist/index.html")) { throw "dist/index.html not found" }
          Write-Host "dist/ contents:"
          Get-ChildItem dist | Select-Object Name, Length

      - name: Build Tauri app
        run: npm run tauri build
        env:
          CI: true
          RUST_BACKTRACE: 1

      - name: List build artifacts
        run: |
          Get-ChildItem src-tauri/target/release/bundle -Recurse -Filter "*.exe" | Select-Object FullName, Length
          Get-ChildItem src-tauri/target/release/bundle -Recurse -Filter "*.msi" | Select-Object FullName, Length