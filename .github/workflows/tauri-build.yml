name: Build Tauri App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --no-bundle
        env:
          CI: true
          RUST_BACKTRACE: full

      - name: Build Tauri bundle
        if: success()
        run: npm run tauri build
        env:
          CI: true
          RUST_BACKTRACE: full